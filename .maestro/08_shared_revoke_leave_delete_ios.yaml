appId: com.bferg89.recount
name: "08 Shared revoke, leave cancel, and delete iOS"
tags:
  - ios
  - shared
  - destructive
---
- evalScript: ${output.revokeTitle = 'Maestro Revoke ' + Date.now()}
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: "helpers/open_dev_server.yaml"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000
- tapOn:
    id: "login-email-input"
- inputText: "e2e.owner@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 15000
- tapOn:
    id: "tab-create-log"
- extendedWaitUntil:
    visible:
      id: "screen-create-log"
    timeout: 10000
- tapOn:
    id: "create-log-title-input"
- inputText: ${output.revokeTitle}
- tapOn:
    id: "create-log-location-input"
- inputText: "Revoke City"
- tapOn:
    id: "create-add-person-button"
- extendedWaitUntil:
    visible: "E2E Friend"
    timeout: 15000
- tapOn: "E2E Friend"
- extendedWaitUntil:
    visible: "E2E Friend"
    timeout: 10000
- tapOn:
    id: "create-log-save-button"
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 20000
- assertVisible: ${output.revokeTitle}
- tapOn:
    id: "log-detail-back-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000
- tapOn:
    id: "tab-profile"
- scrollUntilVisible:
    element:
      id: "profile-sign-out-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "profile-sign-out-button"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000

- tapOn:
    id: "login-email-input"
- inputText: "e2e.friend@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible: ${output.revokeTitle}
    timeout: 20000
- tapOn: ${output.revokeTitle}
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "log-detail-leave-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "log-detail-leave-button"
- assertVisible: "Leave log?"
- tapOn: "Cancel"
- assertVisible:
    id: "log-detail-leave-button"
- tapOn:
    id: "log-detail-back-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000
- tapOn:
    id: "tab-profile"
- scrollUntilVisible:
    element:
      id: "profile-sign-out-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "profile-sign-out-button"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000

- tapOn:
    id: "login-email-input"
- inputText: "e2e.owner@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible: ${output.revokeTitle}
    timeout: 20000
- tapOn: ${output.revokeTitle}
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "log-detail-edit-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "log-detail-edit-button"
- extendedWaitUntil:
    visible:
      id: "screen-edit-log"
    timeout: 10000
- tapOn: "E2E Friend"
- assertVisible: "Remove E2E Friend?"
- tapOn: "Delete E2E Friend"
- assertNotVisible: "E2E Friend"
- tapOn:
    id: "edit-log-publish-button"
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 20000
- assertVisible: ${output.revokeTitle}
- tapOn:
    id: "log-detail-back-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000
- tapOn:
    id: "tab-profile"
- scrollUntilVisible:
    element:
      id: "profile-sign-out-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "profile-sign-out-button"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000

- tapOn:
    id: "login-email-input"
- inputText: "e2e.friend@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 15000
- assertNotVisible: ${output.revokeTitle}
- tapOn:
    id: "tab-profile"
- scrollUntilVisible:
    element:
      id: "profile-sign-out-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "profile-sign-out-button"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000

- tapOn:
    id: "login-email-input"
- inputText: "e2e.owner@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible: ${output.revokeTitle}
    timeout: 20000
- tapOn: ${output.revokeTitle}
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "log-detail-delete-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "log-detail-delete-button"
- assertVisible: "Delete log?"
- tapOn: "Cancel"
- assertVisible:
    id: "log-detail-delete-button"
- tapOn:
    id: "log-detail-delete-button"
- assertVisible: "Delete log?"
- tapOn: "Delete log"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 15000
- assertNotVisible: ${output.revokeTitle}
