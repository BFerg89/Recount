appId: com.bferg89.recount
name: "09 Navigation and deep links iOS"
tags:
  - ios
  - navigation
  - deep-link
  - smoke
---
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: "helpers/open_dev_server.yaml"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000
- stopApp
- openLink: "recount://logs/00000000-0000-0000-0000-000000000000"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000
- assertNotVisible:
    id: "screen-log-detail"

- tapOn:
    id: "login-email-input"
- inputText: "e2e.owner@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- runFlow:
    file: "helpers/dismiss_system_prompts.yaml"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 15000

- openLink: "recount://logs/00000000-0000-0000-0000-000000000000"
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 10000
- assertVisible:
    id: "log-detail-state-text"
- assertNotVisible:
    id: "log-detail-edit-button"
- assertNotVisible:
    id: "log-detail-delete-button"
- tapOn:
    id: "log-detail-back-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000

- openLink: "recount://logs/not-a-real-id"
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 10000
- assertVisible:
    id: "log-detail-state-text"
- tapOn:
    id: "log-detail-back-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000

- openLink: "recount://logs/00000000-0000-0000-0000-000000000000/edit"
- extendedWaitUntil:
    visible:
      id: "screen-edit-log"
    timeout: 10000
- assertVisible:
    id: "edit-log-state-text"
- assertVisible:
    id: "edit-log-publish-button"
    enabled: false
- tapOn:
    id: "edit-log-back-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000

- openLink: "recount://unknown-path"
- extendedWaitUntil:
    visible: "This screen doesn't exist."
    timeout: 10000
- tapOn: "Go to home screen!"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000
