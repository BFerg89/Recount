appId: com.bferg89.recount
name: "01 Owner fixture home and detail iOS"
tags:
  - ios
  - fixtures
  - smoke
---
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: "helpers/open_dev_server.yaml"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000
- tapOn:
    id: "login-email-input"
- inputText: "e2e.owner@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- runFlow:
    file: "helpers/dismiss_system_prompts.yaml"
- extendedWaitUntil:
    visible: ".*E2E Shared.*"
    timeout: 15000
- assertVisible:
    id: "screen-logs-home"
- assertVisible: ".*E2E Shared.*"
- assertVisible: ".*E2E Owner.*"
- scrollUntilVisible:
    element: ".*E2E Minimal.*"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- assertVisible: ".*E2E Minimal.*"
- assertNotVisible: ".*E2E Friend Untagged.*"

- tapOn: ".*E2E Minimal.*"
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 10000
- assertVisible: ".*E2E Minimal.*"
- assertVisible: "Victoria"
- assertVisible: "0 added"
- scrollUntilVisible:
    element:
      id: "log-detail-edit-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- assertVisible:
    id: "log-detail-edit-button"
- assertVisible:
    id: "log-detail-delete-button"
- assertNotVisible:
    id: "log-detail-leave-button"
- tapOn:
    id: "log-detail-back-button"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 10000

- tapOn: ".*E2E Shared.*"
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 10000
- assertVisible: ".*E2E Shared.*"
- assertVisible: "Vancouver"
- assertVisible: ".*E2E Owner.*"
- assertVisible: "E2E Friend"
- assertVisible: "Manual Guest"
- assertVisible: "Pre-game at the apartment"
- assertVisible: "Walked to the main stop"
- assertVisible: "Late-night food"
- scrollUntilVisible:
    element: "Everyone arrived before the first round ended."
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 40
- assertVisible: "We are calling this a strategy, not a detour."
- scrollUntilVisible:
    element:
      id: "log-detail-edit-button"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- assertVisible:
    id: "log-detail-edit-button"
- assertVisible:
    id: "log-detail-delete-button"
- assertNotVisible:
    id: "log-detail-leave-button"
