appId: com.bferg89.recount
name: "04 Create log validation and draft iOS"
tags:
  - ios
  - create
  - destructive
---
- evalScript: ${output.createTitle = 'Maestro Create ' + Date.now()}
- launchApp:
    clearState: true
    clearKeychain: true
    stopApp: true
- runFlow:
    file: "helpers/open_dev_server.yaml"
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 10000
- tapOn:
    id: "login-email-input"
- inputText: "e2e.owner@recount.test"
- tapOn:
    id: "login-password-input"
- inputText: "RecountE2E!2026"
- tapOn:
    id: "login-submit-button"
- runFlow:
    file: "helpers/dismiss_system_prompts.yaml"
- extendedWaitUntil:
    visible:
      id: "screen-logs-home"
    timeout: 15000
- tapOn:
    id: "tab-create-log"
- extendedWaitUntil:
    visible:
      id: "screen-create-log"
    timeout: 10000
- assertVisible:
    id: "create-log-save-button"
    enabled: false

- tapOn:
    id: "create-log-title-input"
- inputText: "   "
- tapOn:
    id: "create-log-location-input"
- inputText: "   "
- assertVisible:
    id: "create-log-save-button"
    enabled: false
- tapOn:
    id: "create-log-title-input"
- eraseText: 100
- inputText: "   "
- inputText: ${output.createTitle}
- tapOn:
    id: "create-log-location-input"
- eraseText: 100
- inputText: "   Vancouver   "

- tapOn:
    id: "create-add-person-button"
- extendedWaitUntil:
    visible:
      id: "add-person-sheet"
    timeout: 10000
- tapOn:
    point: "50%,74%"
- inputText: "   "
- tapOn:
    id: "add-person-submit-button"
- assertVisible:
    id: "add-person-sheet"
- tapOn:
    point: "50%,74%"
- eraseText: 100
- inputText: "Sam Maestro"
- tapOn:
    id: "add-person-submit-button"
- extendedWaitUntil:
    visible: "Sam Maestro"
    timeout: 10000
- tapOn: "Sam Maestro"
- assertVisible: "Remove Sam Maestro?"
- tapOn: "Cancel"
- assertVisible: "Sam Maestro"
- tapOn: "Sam Maestro"
- assertVisible: "Remove Sam Maestro?"
- tapOn: "Remove Sam Maestro"
- assertNotVisible: "Sam Maestro"

- tapOn:
    id: "create-add-person-button"
- extendedWaitUntil:
    visible:
      id: "add-person-sheet"
    timeout: 10000
- tapOn:
    point: "50%,74%"
- inputText: "Sam Maestro"
- tapOn:
    id: "add-person-submit-button"
- extendedWaitUntil:
    visible: "Sam Maestro"
    timeout: 10000
- tapOn:
    id: "create-add-person-button"
- extendedWaitUntil:
    visible:
      id: "add-person-friend-option-00000000-0000-4000-8000-000000000102"
    timeout: 15000
- tapOn:
    id: "add-person-friend-option-00000000-0000-4000-8000-000000000102"
- extendedWaitUntil:
    visible: ".*E2E Friend.*"
    timeout: 10000
- tapOn:
    id: "create-add-person-button"
- extendedWaitUntil:
    visible:
      id: "add-person-sheet"
    timeout: 10000
- tapOn:
    id: "add-person-friend-option-00000000-0000-4000-8000-000000000102"
- assertVisible:
    id: "add-person-sheet"
- swipe:
    from:
      id: "add-person-sheet"
    direction: DOWN
    duration: 500

- tapOn:
    id: "create-add-moment-button"
- extendedWaitUntil:
    visible:
      id: "add-moment-sheet"
    timeout: 10000
- tapOn:
    point: "50%,64%"
- inputText: "   "
- tapOn:
    id: "add-moment-submit-button"
- assertVisible:
    id: "add-moment-sheet"
- eraseText: 100
- inputText: "Walk through Gastown"
- tapOn:
    point: "50%,45%"
- eraseText: 100
- tapOn:
    id: "add-moment-submit-button"
- extendedWaitUntil:
    visible: "Walk through Gastown"
    timeout: 10000
- assertNotVisible: "null"
- assertNotVisible: "undefined"

- tapOn:
    id: "create-add-moment-button"
- extendedWaitUntil:
    visible:
      id: "add-moment-sheet"
    timeout: 10000
- tapOn:
    point: "50%,64%"
- inputText: "Discarded Moment"
- swipe:
    from:
      id: "add-moment-sheet"
    direction: DOWN
    duration: 500
- assertNotVisible: "Discarded Moment"

- scrollUntilVisible:
    element:
      id: "create-note-input-highlight"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 50
- tapOn:
    id: "create-note-input-highlight"
- inputText: "A generated Maestro highlight."
- tapOn:
    point: "50%,10%"
- tapOn:
    id: "create-log-save-button"
- extendedWaitUntil:
    visible:
      id: "screen-log-detail"
    timeout: 20000
- assertVisible: ${output.createTitle}
- assertVisible: "Vancouver"
- assertVisible: "Sam Maestro"
- assertVisible: "E2E Friend"
- assertVisible: "Walk through Gastown"
- scrollUntilVisible:
    element: "A generated Maestro highlight."
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 40
